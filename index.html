<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muniz Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <nav id="desktop-nav">
        <div class="logo">Cinthia Muniz</div>
        <div>
            <ul class="nav-links">
                <li><a href="#about">Sobre</a></li>
                <li><a href="#experience">Habilidades</a></li>
                <li><a href="#projects">Projetos</a></li>
                <li><a href="#contact">Contato</a></li>
            </ul>
        </div>
    </nav>
    <nav id="hamburger-nav">
        <div class="logo">Cinthia Muniz</div>
        <div  class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-links">
                <li><a href="#about" onclick="toggleMenu()">About</a></li>
                <li><a href="#experience" onclick="toggleMenu()">Experience</a></li>
                <li><a href="#projects" onclick="toggleMenu()">Projects</a></li>
                <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
            </div>
        </div>
    </nav>
    <section id="profile">
        <div class="section__pic-container">
            <img src="./assets/profilepic.png" alt="Cinthia Muniz profile picture">
        </div>
        <div class="section__text">
            <p class="section__text__p1">Olá, meu nome é</p>
            <h1 class="title">Cínthia Muniz</h1>
            <p class="section__text__p2">UX Designer</p>
            <div class="btn-container">
                <button class="btn btn-color-2" 
                onclick="window.open('./assets/resume-example.pdf')">
                Baixar Currículo
            </button>
            <button class="btn btn-color-1" 
                onclick="location.href='./#contact'">
                Entre em Contato
            </button>
            </div>
            <div id="socials-container">
                <img 
                src="./assets/linkedin.png" 
                alt="My linkedin Profile"
                class="icon" 
                onclick="location.href='https://linkedin.com/'"/>
                <img 
                src="./assets/github.png" 
                alt="My Github Profile"
                class="icon" 
                onclick="location.href='https://github.com/'"/>
            </div>
        </div>
    </section>
    <section>
         
    </section>
    <script src="script.js"></script>
</body>
</html>
